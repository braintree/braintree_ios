name: Tests
on: [pull_request]
concurrency:
  group: tests-${{ github.event.number }}
  cancel-in-progress: true
jobs:
  unit_test_job:
    name: Unit
    runs-on: macos-15-xlarge
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Use Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.0.app
      - name: Install Package dependencies
        run: swift package resolve
      - name: Install CocoaPod dependencies
        run: pod install
      - name: Run Unit Tests
        run: set -o pipefail && xcodebuild -workspace 'Braintree.xcworkspace' -sdk 'iphonesimulator' -configuration 'Debug' -scheme 'UnitTests' -destination 'name=iPhone 16 Pro,OS=18.5,platform=iOS Simulator' -derivedDataPath DerivedData -enableCodeCoverage YES test | ./Pods/xcbeautify/xcbeautify

      - name: Check Unit Test Coverage
        run: |
          RESULT=$(find DerivedData/Logs/Test -name "*.xcresult" | head -1)
          xcrun xccov view --report --json "$RESULT" > /tmp/coverage.json
          python3 - <<'EOF'
          import json
          data = json.load(open('/tmp/coverage.json'))
          targets = [
              t for t in data["targets"]
              if t["name"].startswith("Braintree")
              and t["name"].endswith(".framework")
              and t["name"] != "BraintreeTestShared.framework"
          ]
          covered = sum(t["coveredLines"] for t in targets)
          executable = sum(t["executableLines"] for t in targets)
          pct = (covered / executable * 100) if executable else 0
          print(f"Unit test coverage: {pct:.1f}% ({covered}/{executable} lines)")
          for t in sorted(targets, key=lambda x: x["coveredLines"] / x["executableLines"] if x["executableLines"] else 1):
              t_pct = (t["coveredLines"] / t["executableLines"] * 100) if t["executableLines"] else 0
              print(f"  {t['name']}: {t_pct:.1f}% ({t['coveredLines']}/{t['executableLines']})")
          threshold = 80
          if pct < threshold:
              print(f"\nFAIL: coverage {pct:.1f}% is below threshold {threshold}%")
              raise SystemExit(1)
          print(f"\nPASS: coverage meets {threshold}% threshold")
          EOF
  ui_test_job:
    name: UI
    runs-on: macos-15-xlarge
    timeout-minutes: 20  # Add overall job timeout
    strategy:
      matrix:
        test-suite:
          - ThreeDSecure_V2_UITests
          - PayPal_Checkout_UITests
          - PayPal_Vault_UITests
          - Venmo_UITests
          - PayPalMessaging_Failure_UITests
          - PayPalMessaging_Success_UITests
          - PayPalButton_UITests
          - VenmoButton_UITests
      fail-fast: false  # Continue running other test suites if one fails
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Use Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.0.app

      - name: Install CocoaPod dependencies
        run: pod install

      - name: Boot Simulator
        run: |
          # Boot simulator ahead of time to reduce test startup time
          # Find iPhone 16 Pro with iOS 18.5
          DEVICE_UDID=$(xcrun simctl list devices | grep -A 1 "iOS 18.5" | grep "iPhone 16 Pro (" | head -n 1 | grep -oE '\([A-Z0-9-]+\)' | tr -d '()')

          if [ -n "$DEVICE_UDID" ]; then
            xcrun simctl boot "$DEVICE_UDID" || true
            xcrun simctl bootstatus "$DEVICE_UDID" -b || true
          fi
          # Disable hardware keyboard to avoid input issues
          defaults write com.apple.iphonesimulator ConnectHardwareKeyboard -bool false

      - name: Clean Simulator State
        timeout-minutes: 3
        run: |
          # Reset simulator state to ensure clean environment
          echo "Finding iPhone 16 Pro (iOS 18.5) simulator..."
          DEVICE_UDID=$(xcrun simctl list devices | grep -A 1 "iOS 18.5" | grep "iPhone 16 Pro (" | head -n 1 | grep -oE '\([A-Z0-9-]+\)' | tr -d '()')

          if [ -z "$DEVICE_UDID" ]; then
            echo "::error::iPhone 16 Pro (iOS 18.5) simulator not found"
            exit 1
          fi

          echo "Using simulator: $DEVICE_UDID"

          # Shutdown only the target simulator (not all)
          xcrun simctl shutdown "$DEVICE_UDID" 2>/dev/null || true

          # Erase only the target simulator
          echo "Erasing simulator data..."
          xcrun simctl erase "$DEVICE_UDID"

          # Boot simulator
          echo "Booting simulator..."
          xcrun simctl boot "$DEVICE_UDID"

          # Wait for boot with timeout (60 seconds)
          echo "Waiting for simulator to boot..."
          timeout 60 xcrun simctl bootstatus "$DEVICE_UDID" -b || echo "::warning::Boot status check timed out, continuing anyway"

      - name: Run UI Tests - ${{ matrix.test-suite }}
        run: |
          set -o pipefail
          xcodebuild \
            -workspace 'Braintree.xcworkspace' \
            -sdk 'iphonesimulator' \
            -configuration 'Debug' \
            -scheme 'UITests' \
            -destination 'name=iPhone 16 Pro,OS=18.5,platform=iOS Simulator' \
            -derivedDataPath DerivedData \
            -only-testing:UITests/${{ matrix.test-suite }} \
            -disable-concurrent-destination-testing \
            -retry-tests-on-failure \
            test | ./Pods/xcbeautify/xcbeautify

  integration_test_job:
    name: Integration
    runs-on: macos-15-xlarge
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Use Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.0.app
      - name: Install Package dependencies
        run: swift package resolve
      - name: Install CocoaPod dependencies
        run: pod install
      - name: Run Integration Tests
        run: set -o pipefail && xcodebuild -workspace 'Braintree.xcworkspace' -sdk 'iphonesimulator' -configuration 'Release' -scheme 'IntegrationTests' -destination 'name=iPhone 16 Pro,OS=18.5,platform=iOS Simulator' -derivedDataPath DerivedData test | ./Pods/xcbeautify/xcbeautify
